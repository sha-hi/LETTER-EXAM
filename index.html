<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<title>ഹറഖത്ത് ചലഞ്ച്</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Scheherazade', serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  background: #ffffff;
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}

.screen { display: none; }
.active { display: block; }

input, select {
  width: 80%;
  padding: 10px;
  margin: 8px;
}

.letter {
  font-size: 100px;
  margin: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

.primary { background: #4caf50; color: white; }
.secondary { background: #2196f3; color: white; }

.homeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
}

.leaderboard {
  margin-top: 10px;
  font-size: 14px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">

<h3>🎮 Start Game</h3>

<input type="text" id="playerName" placeholder="Enter Name">

<select id="timeSelect" onchange="showLeaderboard()">
  <option value="10">10 SECOND</option>
  <option value="20">20 SECOND</option>
  <option value="30">30 SECOND</option>
  <option value="0">UNLIMITED</option>
</select>

<button class="primary" onclick="goToGame()">Start</button>
<button class="secondary" onclick="clearData()">Clear</button>

<div id="leaderboard" class="leaderboard"></div>

</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">

<button class="homeBtn" onclick="goHome()">🏠</button>

<h4 id="displayName"></h4>
<div id="score">0</div>
<div id="letter" class="letter">بَ</div>

<button onclick="startGame()">Start</button>
<button onclick="next()">Next</button>

</div>

</div>

<script>

/* 🔑 STORAGE KEY BASE */
function getKey(time){
  return "score_"+time;
}

/* GET SCORES */
function getScores(time){
  return JSON.parse(localStorage.getItem(getKey(time))) || [];
}

/* SAVE SCORE */
function saveScore(time,name,score){
  let scores = getScores(time);

  scores.push({name,score});
  scores.sort((a,b)=>b.score-a.score);
  scores = scores.slice(0,3);

  localStorage.setItem(getKey(time), JSON.stringify(scores));
}

/* SHOW LEADERBOARD */
function showLeaderboard(){
  const time = document.getElementById("timeSelect").value;
  const scores = getScores(time);

  let label = time == 0 ? "Unlimited" : time + " sec";
  let html = "<b>🏆 Top 3 ("+label+")</b><br>";

  scores.forEach((s,i)=>{
    html += `${i+1}. ${s.name} - ${s.score}<br>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

window.onload = showLeaderboard;

/* GAME DATA */
const letters = ["بَ","بِ","بُ","تَ","تِ","تُ","ثَ","ثِ","ثُ"];

let score=0;
let selectedTime=0;
let timerInterval;
let currentPlayer="";

/* START */
function goToGame(){
  const name = document.getElementById("playerName").value.trim();

  if(!name){
    alert("Enter name!");
    return;
  }

  currentPlayer = name;
  selectedTime = parseInt(document.getElementById("timeSelect").value);

  document.getElementById("displayName").textContent = name;

  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

/* HOME */
function goHome(){
  clearInterval(timerInterval);
  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen1").classList.add("active");
  showLeaderboard();
}

/* START GAME */
function startGame(){
  score=0;
  document.getElementById("score").textContent=0;

  next();

  let timeLeft = selectedTime;

  if(selectedTime>0){
    timerInterval = setInterval(()=>{
      timeLeft--;

      if(timeLeft<=0){
        clearInterval(timerInterval);

        saveScore(selectedTime,currentPlayer,score);

        alert("Score: "+score);
        goHome();
      }
    },1000);
  }
}

/* NEXT */
function next(){
  const random = letters[Math.floor(Math.random()*letters.length)];
  document.getElementById("letter").textContent=random;
  score++;
  document.getElementById("score").textContent=score;
}

/* CLEAR ALL SCORES */
function clearData(){
  const pass = prompt("Password:");

  if(pass==="clear"){
    localStorage.clear();
    showLeaderboard();
    alert("All scores cleared");
  }else if(pass!==null){
    alert("Wrong password");
  }
}

</script>

</body>
</html>
