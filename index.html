<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Letter Exam - Children's Edition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Scheherazade+New:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --text: #2D3436;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', sans-serif;
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: -1;
        }

        .container {
            background: var(--glass);
            width: 90%;
            max-width: 850px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            color: #FF6B6B;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: var(--text);
        }

        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        .input-group {
            margin: 20px 0;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--secondary);
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }

        .level-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .level-btn {
            background: white;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #eee;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .level-btn.selected {
            border-color: var(--primary);
            background: var(--accent);
            transform: scale(1.05);
        }

        .level-btn:hover {
            transform: translateY(-3px);
            border-color: var(--secondary);
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
            transition: all 0.3s;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .btn-main:hover {
            filter: brightness(1.1);
        }

        /* Game Screen */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .timer-bar {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #FFE66D);
            width: 100%;
            transition: width 0.1s linear;
        }

        .letter-display {
            font-family: 'Scheherazade New', serif;
            font-size: 130px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            user-select: none;
            line-height: 1.5;
        }

        .base-letter {
            color: var(--text);
            font-weight: bold;
        }

        .fatha {
            color: #FF4757;
        }

        .kasra {
            color: #2E86DE;
        }

        .damma {
            color: #2ED573;
        }

        .game-buttons {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .btn-next {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 20px;
            font-size: 1.5rem;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 8px 15px rgba(78, 205, 196, 0.3);
        }

        /* Result Screen */
        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-status {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .passed {
            color: #2ecc71;
        }

        .failed {
            color: #e74c3c;
        }

        .result-details {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .level-btn:nth-child(5) {
            grid-column: 1 / -1;
        }

        .level-btn.locked {
            opacity: 0.6;
            cursor: not-allowed;
            background: #f0f0f0;
            border-color: #ddd;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100%) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

    <div class="overlay"></div>

    <div class="container">
        <!-- SCREEN 1: LOGIN & LEVEL -->
        <div id="screen1" class="screen active">
            <h1>🎮Exam

            </h1>
            <div class="input-group">
                <input type="text" id="playerName" placeholder="Enter your name" dir="ltr">
            </div>

            <h3>Select Section</h3>
            <div class="level-grid" style="margin-top: 10px; margin-bottom: 20px;">
                <button class="level-btn selected" id="sec1Btn" onclick="selectSection(1)">Section 1<br><small>Basic Harakat</small></button>
                <button class="level-btn" id="sec2Btn" onclick="selectSection(2)">Section 2<br><small>With Tanween</small></button>
                <button class="level-btn" id="sec3Btn" onclick="selectSection(3)" style="grid-column: 1 / -1;">Practice<br><small>Unlimited Time</small></button>
            </div>

            <button class="btn-main" onclick="goToLevelSelect()">NEXT ➡️</button>

            <div style="margin-top: 35px; padding-top: 25px; border-top: 2px dashed rgba(0,0,0,0.1);">
                <p style="margin: 0 0 10px 0; color: #7f8c8d; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Discover More</p>
                <button class="btn-main" style="background: linear-gradient(135deg, #8e44ad, #2980b9); margin-top: 0; width: 100%; font-size: 1rem; padding: 15px 20px; box-shadow: 0 10px 20px rgba(142, 68, 173, 0.2); letter-spacing: 0.5px;" onclick="alert('🔒 Locked! Check back later.')">
                    ✨ SHAHID RAHMANI LEARNING HUB 🔒
                </button>
            </div>
        </div>

        <!-- SCREEN LEVEL SELECT -->
        <div id="screenLevelSelect" class="screen">
            <h3>Select Level</h3>
            <div class="level-grid" id="levelGrid">
                <!-- Levels will be injected here -->
            </div>
            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 25px;">
                <button class="btn-main" style="background: #95a5a6; margin-top: 0;" onclick="showScreen('screen1')">BACK ⬅️</button>
                <button class="btn-main" style="margin-top: 0;" onclick="goToGame()">LET'S GO 🚀</button>
            </div>
        </div>

        <!-- SCREEN 2: GAME -->
        <div id="screen2" class="screen">
            <div class="stats">
                <span>⭐ Score: <span id="currentScore">0</span></span>
                <span id="goalContainer">🏆 Goal: <span id="targetScore">15</span></span>
            </div>
            <div class="timer-bar">
                <div id="timerFill" class="timer-fill"></div>
            </div>

            <div class="letter-display" id="letterContainer">
                <div class="base-letter">أ</div>
            </div>

            <div class="game-buttons">
                <button id="gameHomeBtn" class="btn-next" style="background: #95a5a6; width: auto; padding: 20px 30px; display: none;" onclick="mainMenu()">🏠</button>
                <button class="btn-next" onclick="nextLetter()" style="flex: 1;">NEXT ➡️</button>
            </div>

            <p style="margin-top: 20px; color: #666; font-size: 0.9rem;">Tap Next after saying the letter!</p>
        </div>

        <!-- SCREEN 3: RESULT -->
        <div id="screen3" class="screen">
            <div id="resultIcon" class="result-icon">🎉</div>
            <div id="resultStatus" class="result-status">Passed</div>
            <div class="result-details" id="resultDetails">
                You said 20 letters!<br>Requirement: 15
            </div>

            <button class="btn-main" onclick="restart()">TRY AGAIN 🔄</button>
            <button class="btn-main" style="background: #95a5a6; margin-top: 10px;" onclick="mainMenu()">MAIN MENU 🏠</button>
            <button id="shareBtn" class="btn-main" style="background: #25D366; margin-top: 10px;"
                onclick="shareResult()">SHARE SCREENSHOT 📸</button>
        </div>
    </div>

    <canvas id="confetti" class="confetti"></canvas>

    <script>
        const arabicLetters = ["ا", "ب", "ت", "ث", "ج", "ح", "خ", "د", "ذ", "ر", "ز", "س", "ش", "ص", "ض", "ط", "ظ", "ع", "غ", "ف", "ق", "ك", "ل", "م", "ن", "ه", "و", "ي"];
        const harakatSections = {
            1: [
                { mark: "َ", class: "fatha" },
                { mark: "ِ", class: "kasra" },
                { mark: "ُ", class: "damma" }
            ],
            2: [
                { mark: "َ", class: "fatha" },
                { mark: "ِ", class: "kasra" },
                { mark: "ُ", class: "damma" },
                { mark: "ً", class: "fatha" },
                { mark: "ٍ", class: "kasra" },
                { mark: "ٌ", class: "damma" }
            ],
            3: [
                { mark: "َ", class: "fatha" },
                { mark: "ِ", class: "kasra" },
                { mark: "ُ", class: "damma" },
                { mark: "ً", class: "fatha" },
                { mark: "ٍ", class: "kasra" },
                { mark: "ٌ", class: "damma" }
            ]
        };

        const levels = {
            1: { start: 0, end: 7, target: 15, time: 9, label: "Level 1" },
            2: { start: 7, end: 14, target: 15, time: 10, label: "Level 2" },
            3: { start: 14, end: 21, target: 15, time: 10, label: "Level 3" },
            4: { start: 21, end: 28, target: 15, time: 10, label: "Level 4" },
            5: { start: 0, end: 28, target: 25, time: 13, label: "Level 5" }
        };

        let currentSection = 1;
        let currentLevel = 1;
        let score = 0;

        function getUnlockedLevel(sec) {
            if (sec === 3) return 5; // All levels unlocked in Practice Mode
            let val = parseInt(localStorage.getItem('unlockedLevel_sec' + sec));
            if (isNaN(val)) {
                if (sec === 1) return parseInt(localStorage.getItem('unlockedLevel')) || 1;
                return 1;
            }
            return val;
        }

        function setUnlockedLevel(sec, lvl) {
            localStorage.setItem('unlockedLevel_sec' + sec, lvl);
            if (sec === 1) localStorage.setItem('unlockedLevel', lvl);
        }

        function selectSection(sec) {
            currentSection = sec;
            document.getElementById('sec1Btn').classList.remove('selected');
            document.getElementById('sec2Btn').classList.remove('selected');
            if(document.getElementById('sec3Btn')) document.getElementById('sec3Btn').classList.remove('selected');
            document.getElementById('sec' + sec + 'Btn').classList.add('selected');
            currentLevel = 1;
        }
        let timer = null;
        let timeLeft = 0;
        let player = "";
        let currentLetters = [];
        let gameActive = false;

        function renderLevels() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            let unlocked = getUnlockedLevel(currentSection);
            for (let i = 1; i <= 5; i++) {
                const lvl = levels[i];
                const isLocked = i > unlocked;
                const lockIcon = isLocked ? "🔒 " : "";
                const btnClass = isLocked ? "level-btn locked" : (i === currentLevel ? "level-btn selected" : "level-btn");
                grid.innerHTML += `
                    <button class="${btnClass}" onclick="if(!${isLocked}) selectLevel(${i}, this)" ${isLocked ? 'disabled' : ''}>
                        ${lockIcon}${lvl.label}<br><small>${lvl.target} letters / ${lvl.time}s</small>
                    </button>
                `;
            }
        }

        function selectLevel(lvl, btn) {
            currentLevel = lvl;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
            if (btn) btn.classList.add('selected');
        }

        // Initialize levels on load
        renderLevels();

        function goToLevelSelect() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                alert("Please enter your name brave explorer!");
                return;
            }
            player = name;
            
            if (currentSection === 3) {
                // Skip level selection for Practice mode
                goToGame();
                return;
            }
            
            renderLevels();
            showScreen('screenLevelSelect');
        }

        function goToGame() {
            // Prepare letters for level
            const lvl = levels[currentLevel];
            const lettersPool = currentSection === 3 ? arabicLetters : arabicLetters.slice(lvl.start, lvl.end);
            currentLetters = [];
            const activeHarakat = harakatSections[currentSection];
            lettersPool.forEach(l => {
                activeHarakat.forEach(h => {
                    currentLetters.push({ base: l, mark: h.mark, class: h.class });
                });
            });

            // Set UI
            document.getElementById('targetScore').textContent = lvl.target;
            document.getElementById('currentScore').textContent = 0;
            score = 0;
            
            if (currentSection === 3) {
                document.getElementById('gameHomeBtn').style.display = 'block';
                document.getElementById('goalContainer').style.display = 'none';
            } else {
                document.getElementById('gameHomeBtn').style.display = 'none';
                document.getElementById('goalContainer').style.display = 'inline';
            }

            showScreen('screen2');
            startCountdown();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startCountdown() {
            gameActive = true;
            nextLetter(true); // Don't count first one

            clearInterval(timer);
            const timerContainer = document.querySelector('.timer-bar');

            if (currentSection === 3) {
                timerContainer.style.display = 'none';
            } else {
                timerContainer.style.display = 'block';
                timeLeft = levels[currentLevel].time;
                const totalTime = timeLeft;
                document.getElementById('timerFill').style.width = "100%";
                
                timer = setInterval(() => {
                    timeLeft -= 0.1;
                    const percent = (timeLeft / totalTime) * 100;
                    document.getElementById('timerFill').style.width = percent + "%";

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        endGame();
                    }
                }, 100);
            }
        }

        function nextLetter(isStart = false) {
            if (!gameActive && !isStart) return;

            if (!isStart) {
                score++;
                document.getElementById('currentScore').textContent = score;
            }

            const r = currentLetters[Math.floor(Math.random() * currentLetters.length)];
            const container = document.getElementById('letterContainer');

            // All letters bold as requested
            const isBold = "font-weight: 900;";

            container.innerHTML = `
                <span class="base-letter" style="${isBold}">${r.base}</span><span class="${r.class}">${r.mark}</span>
            `;

            // Animation for new letter
            container.style.animation = 'none';
            container.offsetHeight; /* trigger reflow */
            container.style.animation = 'slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        function endGame() {
            gameActive = false;
            const target = levels[currentLevel].target;
            const passed = score >= target;

            const statusEl = document.getElementById('resultStatus');
            const iconEl = document.getElementById('resultIcon');
            const detailsEl = document.getElementById('resultDetails');

            if (passed) {
                statusEl.textContent = "Passed";
                statusEl.className = "result-status passed";
                iconEl.textContent = "🎉";
                detailsEl.innerHTML = `അടിപൊളിയായിട്ടുണ്ട്,  ${player}<br>നിങ്ങൾ  <b>${score}</b> അക്ഷരങ്ങൾ പറഞ്ഞു.<br>വിജയിക്കാൻ ആവശ്യമായത്: ${target}`;

                // Unlock next level if applicable
                if (currentSection !== 3) {
                    let unlocked = getUnlockedLevel(currentSection);
                    if (currentLevel === unlocked && currentLevel < 5) {
                        setUnlockedLevel(currentSection, unlocked + 1);
                    }
                }

                startConfetti();
            } else {
                statusEl.textContent = "Failed";
                statusEl.className = "result-status failed";
                iconEl.textContent = "😔";
                detailsEl.innerHTML = `Good try ${player}<br>നിങ്ങൾ <b>${score}</b> അക്ഷരങ്ങളെ പറഞ്ഞിട്ടുള്ളൂ.<br>വിജയിക്കാൻ ആവശ്യമായത്: ${target}</b> അക്ഷരങ്ങൾ.`;
            }

            showScreen('screen3');
        }

        function restart() {
            stopConfetti();
            goToGame();
        }

        function mainMenu() {
            gameActive = false;
            clearInterval(timer);
            stopConfetti();
            showScreen('screen1');
        }

        async function shareResult() {
            const screen = document.querySelector('.container');
            const shareBtn = document.getElementById('shareBtn');
            const originalText = shareBtn.innerHTML;
            shareBtn.innerHTML = "GENERATING... ⏳";
            shareBtn.disabled = true;

            const passed = score >= levels[currentLevel].target;
            const emoji = passed ? "🎉" : "💪";
            const status = passed ? "Passed" : "Failed";
            const msg = `🎮 Arabic Letter Exam Result\n\n👤 Player: ${player}\n📊 Level: ${currentLevel}\n🏆 Status: ${status}\n⭐ Score: ${score}\n\n${emoji} Keep learning`;

            try {
                const canvas = await html2canvas(screen, {
                    scale: 2,
                    backgroundColor: "#ffffff",
                    borderRadius: 30
                });

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], "result.png", { type: "image/png" });

                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                text: msg,
                                files: [file]
                            });
                        } catch (err) {
                            console.error("Share failed", err);
                            fallbackShare(msg);
                        }
                    } else {
                        // Fallback
                        alert("Downloading screenshot... We will now open WhatsApp to share it");
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'ArabicExamResult.png';
                        a.click();
                        URL.revokeObjectURL(url);
                        fallbackShare(msg);
                    }
                    shareBtn.innerHTML = originalText;
                    shareBtn.disabled = false;
                });
            } catch (e) {
                console.error(e);
                fallbackShare(msg);
                shareBtn.innerHTML = originalText;
                shareBtn.disabled = false;
            }
        }

        function fallbackShare(msg) {
            const url = "https://wa.me/?text=" + encodeURIComponent(msg);
            window.open(url, "_blank");
        }

        // CONFETTI LOGIC
        function startConfetti() {
            const canvas = document.getElementById('confetti');
            canvas.style.display = 'block';
            for (let i = 0; i < 50; i++) {
                createParticle();
            }
        }

        function createParticle() {
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#2ecc71', '#3498db'];
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.width = '10px';
            particle.style.height = '10px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '-10px';
            particle.style.borderRadius = '50%';
            particle.style.zIndex = '1000';
            particle.style.animation = `confetti-fall ${2 + Math.random() * 3}s linear forwards`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 5000);
        }

        function stopConfetti() {
            document.getElementById('confetti').style.display = 'none';
        }
    </script>
</body>

</html>
