<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<title>ഹറഖത്ത് ചലഞ്ച്</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Scheherazade', serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  background: #ffffff;
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  text-align: center;
}

.screen { display: none; }
.active { display: block; }

#screen2 { position: relative; }

input, select {
  width: 80%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

.letter {
  font-size: 110px;
  margin: 20px;
  font-weight: bold;
}

button {
  padding: 10px 18px;
  margin: 6px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.primary {
  background: linear-gradient(135deg, #43e97b, #38f9d7);
}
.secondary {
  background: linear-gradient(135deg, #2196f3, #21cbf3);
  color: white;
}

.homeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #444;
  color: white;
}

.scoreboard {
  font-size: 16px;
  background: #f1f3f6;
  padding: 10px;
  border-radius: 10px;
}

.leaderboard {
  margin-top: 10px;
  font-size: 14px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">

  <h2>🎮 GAME ആരംഭിക്കുക</h2>

  <input type="text" id="playerName" placeholder="പേര് നൽകുക">

  <select id="timeSelect">
    <option value="10">10 SECOND</option>
    <option value="20">20 SECOND</option>
    <option value="30">30 SECOND</option>
    <option value="0">UNLIMITED TIME</option>
  </select>

  <button class="primary" onclick="goToGame()">▶️ START</button>
  <button class="secondary" onclick="clearData()">🗑 Clear</button>

  <!-- ✅ LEADERBOARD -->
  <div class="leaderboard" id="leaderboard"></div>

</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen">

  <button class="homeBtn" onclick="goHome()">🏠</button>

  <div class="scoreboard">
    👤 <span id="displayName"></span><br>
    ⏱ <span id="timer">0</span> | ⭐ <span id="score">0</span>
  </div>

  <div id="letter" class="letter">بَ</div>

  <button class="primary" onclick="startGame()">Start</button>

  <div>
    <button class="secondary" onclick="previous()" id="prevBtn" disabled>⬅️</button>
    <button class="secondary" onclick="next()" id="nextBtn" disabled>➡️</button>
  </div>

</div>

</div>

<script>

/* STORAGE KEYS */
const SCORE_KEY = "topScores";

/* LOAD SCORES */
function getScores() {
  return JSON.parse(localStorage.getItem(SCORE_KEY)) || [];
}

/* SAVE SCORES */
function saveScore(name, score) {
  let scores = getScores();
  scores.push({name, score});

  // Sort high → low
  scores.sort((a,b)=>b.score-a.score);

  // Keep top 3
  scores = scores.slice(0,3);

  localStorage.setItem(SCORE_KEY, JSON.stringify(scores));
}

/* SHOW LEADERBOARD */
function showLeaderboard() {
  const scores = getScores();
  let html = "<b>🏆 Top 3</b><br>";

  scores.forEach((s,i)=>{
    html += `${i+1}. ${s.name} - ${s.score}<br>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
}

window.onload = showLeaderboard;

/* GAME LOGIC */
const rawLetters = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر"];
const harakats = ["َ","ِ","ُ"];
let letters = [];

rawLetters.forEach(l=>{
  harakats.forEach(h=>{
    letters.push(l+h);
  });
});

let history = [];
let index = -1;
let score = 0;
let timerInterval;
let selectedTime = 0;
let currentPlayer = "";

/* START SCREEN */
function goToGame() {
  const name = document.getElementById("playerName").value.trim();

  if (!name) {
    alert("Enter name!");
    return;
  }

  currentPlayer = name;
  selectedTime = parseInt(document.getElementById("timeSelect").value);

  document.getElementById("displayName").textContent = name;
  document.getElementById("screen1").classList.remove("active");
  document.getElementById("screen2").classList.add("active");
}

/* HOME */
function goHome() {
  clearInterval(timerInterval);

  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen1").classList.add("active");

  showLeaderboard();
}

/* GAME */
function startGame() {
  history=[]; index=-1; score=0;
  document.getElementById("score").textContent=0;

  document.getElementById("nextBtn").disabled=false;
  document.getElementById("prevBtn").disabled=false;

  next();

  let timeLeft = selectedTime;

  if (selectedTime > 0) {
    timerInterval = setInterval(()=>{
      timeLeft--;
      document.getElementById("timer").textContent = timeLeft;

      if (timeLeft<=0){
        clearInterval(timerInterval);

        saveScore(currentPlayer, score); // ✅ SAVE SCORE

        alert("Time Over! Score: " + score);
        goHome();
      }
    },1000);
  }
}

/* LETTER */
function next() {
  const random = letters[Math.floor(Math.random()*letters.length)];
  history.push(random);
  index++;
  score++;
  document.getElementById("score").textContent=score;
  document.getElementById("letter").textContent=random;
}

function previous(){}

/* CLEAR DATA */
function clearData(){
  const pass = prompt("Enter password:");

  if(pass==="clear"){
    localStorage.removeItem(SCORE_KEY);
    showLeaderboard();
    alert("Data Cleared");
  }else if(pass!==null){
    alert("Wrong password");
  }
}

</script>

</body>
</html>
