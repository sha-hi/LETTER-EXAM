<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<title>ഹറഖത്ത് ചലഞ്ച് FINAL</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Scheherazade', serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

.container {
  background:#fff;
  width:360px;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

.screen { display:none; }
.active { display:block; }

input,select {
  width:85%;
  padding:10px;
  margin:8px 0;
}

button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

.primary { background:#4caf50; color:white; }
.secondary { background:#2196f3; color:white; }

.letter {
  font-size:120px;
  margin:20px;
}

/* COLORS */
.base { color:#000; }
.fatha { color:red; }
.kasra { color:blue; }
.damma { color:green; }

.resultBox {
  background:#f1f3f6;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<!-- SCREEN 1 -->
<div id="screen1" class="screen active">

<h2>🎮 GAME ആരംഭിക്കുക</h2>

<input type="text" id="playerName" placeholder="പേര് നൽകുക">

<select id="levelSelect">
  <option value="1">Level 1 (10 Letters)</option>
  <option value="2">Level 2 (20 Letters)</option>
  <option value="3">Level 3 (Full)</option>
</select>

<select id="timeSelect">
  <option value="10">10 sec</option>
  <option value="20">20 sec</option>
  <option value="30">30 sec</option>
</select>

<button class="primary" onclick="goToGame()">▶️ START</button>

</div>

<!-- SCREEN 2 GAME -->
<div id="screen2" class="screen">

<div>
👤 <span id="displayName"></span><br>
⏱ <span id="timer"></span><br>
⭐ <span id="score">0</span>
</div>

<div id="letter" class="letter"></div>

<button class="primary" onclick="startGame()">Start</button>
<button class="secondary" onclick="next()">Next ➡️</button>

</div>

<!-- SCREEN 3 RESULT -->
<div id="screen3" class="screen">

<h2>🏁 Result</h2>

<div class="resultBox" id="resultText"></div>

<button class="primary" onclick="restart()">🔁 Play Again</button>

<button class="secondary" onclick="shareToUsthad()">📤 Share to Usthad</button>

</div>

</div>

<script>

/* LETTERS */
const arabicLetters = [
"ا","ب","ت","ث","ج","ح","خ","د","ذ","ر",
"ز","س","ش","ص","ض","ط","ظ","ع","غ","ف",
"ق","ك","ل","م","ن","ه","و","ي"
];

const harakat = [
{mark:"َ", class:"fatha"},
{mark:"ِ", class:"kasra"},
{mark:"ُ", class:"damma"}
];

function generateLetters(count){
  let arr = arabicLetters.slice(0,count);
  let result=[];
  arr.forEach(l=>{
    harakat.forEach(h=>{
      result.push({base:l, mark:h.mark, class:h.class});
    });
  });
  return result;
}

function getLetters(level){
  if(level==1) return generateLetters(10);
  if(level==2) return generateLetters(20);
  return generateLetters(28);
}

function renderLetter(o){
  return `<span class="base">${o.base}</span><span class="${o.class}">${o.mark}</span>`;
}

/* STATE */
let letters=[], score=0, timer=null, time=0, player="";

/* NAV */
function goToGame(){
  const name=document.getElementById("playerName").value.trim();
  if(!name){ alert("Enter name"); return; }

  player=name;
  const level=document.getElementById("levelSelect").value;
  letters=getLetters(level);
  time=parseInt(document.getElementById("timeSelect").value);

  document.getElementById("displayName").textContent=name;

  showScreen(2);
}

/* SCREEN SWITCH */
function showScreen(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("screen"+n).classList.add("active");
}

/* GAME */
function startGame(){
  score=0;
  document.getElementById("score").textContent=0;

  next();

  let t=time;
  document.getElementById("timer").textContent=t;

  clearInterval(timer);
  timer=setInterval(()=>{
    t--;
    document.getElementById("timer").textContent=t;

    if(t<=0){
      clearInterval(timer);
      endGame();
    }
  },1000);
}

function next(){
  const r=letters[Math.floor(Math.random()*letters.length)];
  document.getElementById("letter").innerHTML=renderLetter(r);
  score++;
  document.getElementById("score").textContent=score;
}

/* END GAME */
function endGame(){
  const date = new Date().toLocaleString();

  const text =
`👤 ${player}
⭐ Score: ${score}
📅 ${date}`;

  document.getElementById("resultText").innerText = text;

  window.finalMessage = text;

  showScreen(3);
}

/* SHARE */
function shareToUsthad(){
  const msg = `🎮 Harakat Challenge Result\n\n${window.finalMessage}`;

  if(navigator.share){
    navigator.share({
      text: msg
    });
  } else {
    const url = "https://wa.me/?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
  }
}

/* RESTART */
function restart(){
  showScreen(1);
}

</script>

</body>
</html>
